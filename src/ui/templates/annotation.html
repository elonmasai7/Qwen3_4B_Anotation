{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <h1>Annotation</h1>
    <p class="subtitle">Submit documents for AI-powered annotation</p>
</section>

<form class="card form" id="annotation-form" aria-label="Annotation form">
    <div class="form-group">
        <label for="data-id">Data ID</label>
        <input type="text" id="data-id" name="data_id" class="form-input" required placeholder="e.g. doc_001" autocomplete="off">
    </div>

    <div class="form-group">
        <label for="content">Content</label>
        <textarea id="content" name="content" class="form-input form-textarea" required rows="6" placeholder="Paste or type the text content to annotate..."></textarea>
    </div>

    <div class="form-group">
        <label for="prompt-template">Prompt Template</label>
        <select id="prompt-template" name="prompt_template" class="form-input" required>
            <option value="">Select a template...</option>
            <option value="classification">Classification</option>
            <option value="extraction">Entity Extraction</option>
            <option value="summarization">Summarization</option>
            <option value="sentiment">Sentiment Analysis</option>
            <option value="qa">Question Answering</option>
        </select>
    </div>

    <div class="form-group">
        <button type="submit" class="btn btn-primary" id="annotate-btn">
            <span class="btn-text">Run Annotation</span>
            <span class="btn-spinner" aria-hidden="true"></span>
        </button>
    </div>
</form>

<section class="card" id="annotation-result" aria-labelledby="result-heading" hidden>
    <h2 id="result-heading">Annotation Result</h2>
    <dl class="result-list" id="result-details">
        <div class="result-item">
            <dt>Annotation ID</dt>
            <dd id="result-id">--</dd>
        </div>
        <div class="result-item">
            <dt>Status</dt>
            <dd id="result-status">--</dd>
        </div>
        <div class="result-item">
            <dt>Labels</dt>
            <dd id="result-labels">--</dd>
        </div>
        <div class="result-item">
            <dt>Processing Time</dt>
            <dd id="result-time">--</dd>
        </div>
    </dl>
</section>
{% endblock %}
