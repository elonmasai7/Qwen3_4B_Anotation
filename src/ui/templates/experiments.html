{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <h1>Experiments</h1>
    <p class="subtitle">Create and compare annotation experiments</p>
</section>

<section class="card" aria-labelledby="create-experiment-heading">
    <h2 id="create-experiment-heading">New Experiment</h2>
    <form class="form" id="experiment-form" aria-label="Create experiment form">
        <div class="form-row">
            <div class="form-group">
                <label for="exp-name">Name</label>
                <input type="text" id="exp-name" name="name" class="form-input" required placeholder="My experiment" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="exp-examples">Examples</label>
                <input type="number" id="exp-examples" name="num_examples" class="form-input" value="5" min="1" max="100">
            </div>
        </div>
        <div class="form-group">
            <label for="exp-prompt">Prompt Template</label>
            <textarea id="exp-prompt" name="prompt_template" class="form-input form-textarea" required rows="4" placeholder="Enter your prompt template..."></textarea>
        </div>
        <div class="form-row form-row-3">
            <div class="form-group">
                <label for="exp-temp">Temperature</label>
                <input type="number" id="exp-temp" name="temperature" class="form-input" value="0.1" step="0.05" min="0" max="2">
            </div>
            <div class="form-group">
                <label for="exp-top-p">Top P</label>
                <input type="number" id="exp-top-p" name="top_p" class="form-input" value="0.95" step="0.01" min="0" max="1">
            </div>
            <div class="form-group">
                <label for="exp-branches">Branches</label>
                <input type="number" id="exp-branches" name="num_branches" class="form-input" value="3" min="1" max="10">
            </div>
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-primary" id="create-exp-btn">
                <span class="btn-text">Create Experiment</span>
                <span class="btn-spinner" aria-hidden="true"></span>
            </button>
        </div>
    </form>
</section>

<section class="card" aria-labelledby="experiments-heading">
    <h2 id="experiments-heading">All Experiments</h2>
    <div class="table-wrapper">
        <table class="table" id="experiments-table" aria-label="Experiments list">
            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Status</th>
                    <th scope="col">Accuracy</th>
                    <th scope="col">F1</th>
                    <th scope="col">Latency</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6" class="empty-state">No experiments yet. Create one above.</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
